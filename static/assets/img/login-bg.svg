<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="1000" fill="#7a1012"/>
  <!-- structural steel girder lattice -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="3" fill="none">
    <path d="M0 220 L1200 120 M0 420 L1200 320 M0 620 L1200 520 M0 820 L1200 720"/>
    <path d="M150 0 L150 1000 M350 0 L350 1000 M550 0 L550 1000 M750 0 L750 1000 M950 0 L950 1000"/>
    <!-- diagonal trusses -->
    <path d="M150 220 L350 120 L350 320 L550 220 L550 420 L750 320 L750 520 L950 420"/>
    <path d="M150 420 L350 320 L350 520 L550 420 L550 620 L750 520 L750 720 L950 620"/>
    <path d="M150 620 L350 520 L350 720 L550 620 L550 820 L750 720"/>
  </g>
  <!-- I-beams floating -->
  <g fill="#ffffff" fill-opacity="0.05">
    <g transform="translate(840 700) rotate(-18)">
      <rect x="0" y="0" width="220" height="22" rx="3"/>
      <rect x="0" y="120" width="220" height="22" rx="3"/>
      <rect x="99" y="22" width="22" height="98"/>
    </g>
    <g transform="translate(120 780) rotate(8)">
      <rect x="0" y="0" width="180" height="18" rx="3"/>
      <rect x="0" y="96" width="180" height="18" rx="3"/>
      <rect x="81" y="18" width="18" height="78"/>
    </g>
  </g>
  <!-- gold spark accents -->
  <g fill="#e6a817" fill-opacity="0.5">
    <circle cx="350" cy="120" r="5"/>
    <circle cx="550" cy="220" r="5"/>
    <circle cx="750" cy="320" r="5"/>
    <circle cx="950" cy="420" r="5"/>
    <circle cx="350" cy="520" r="4"/>
    <circle cx="550" cy="620" r="4"/>
  </g>
  <rect width="1200" height="1000" fill="url(#vig)"/>
  <defs>
    <radialGradient id="vig" cx="50%" cy="40%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a0708" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
</svg>
